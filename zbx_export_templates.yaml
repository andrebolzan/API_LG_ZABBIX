zabbix_export:
  version: '7.0'
  template_groups:
    - uuid: 7df96b18c230490a9a0a9e2307226338
      name: Templates
  templates:
    - uuid: 12d635920cd84001a062d3edf5e23ab0
      template: 'AC LG - API ShellScript'
      name: 'AC LG - API ShellScript'
      description: |
        Formato esperado do retorno:
        ([0-9]*);([0-9]*);([0-9]*);(COOL);(HIGH);([0-9]*)
        
        # Acessar container do zabbix-server
        docker exec -it zabbix-server /bin/bash
        
        # Entrar no diretório do plugin
        cd /usr/lib/zabbix/externalscripts/API_LG
        
        # Listar ID dos dispositivos para adicionar na macro {$AC.POP.ID}
         python3 teste.py -c BR -l en-US ls
      groups:
        - name: Templates
      items:
        - uuid: 23e36f7884044967816d077aec589cf0
          name: 'Ar Condicionado - GET API LG'
          type: EXTERNAL
          key: 'check_LG_AC.sh["-D","{$AC.POP.ID}"]'
          delay: 10m
          history: 90d
          value_type: TEXT
          trends: '0'
          description: 'check_LG_AC.sh["-D","46d806b5-60f2-1860-ba5a-1c392924f8ed"]'
          triggers:
            - uuid: 99cc36a6faa54e7fadae281d2777f7a8
              expression: 'find(/AC LG - API ShellScript/check_LG_AC.sh["-D","{$AC.POP.ID}"],,"like","0;;;;;")=1'
              name: 'Erro na API'
              priority: DISASTER
        - uuid: 485556db6556424099afd9978760e479
          name: 'CONSUMO WATTs'
          type: DEPENDENT
          key: CONSUMOWATT
          delay: '0'
          history: 90d
          value_type: FLOAT
          units: W
          description: 'Consumo em Watts'
          preprocessing:
            - type: REGEX
              parameters:
                - '([0-9]*);([0-9]*);([0-9]*);(\w{3,4});(\w{3,4});([0-9]*)'
                - \6
          master_item:
            key: 'check_LG_AC.sh["-D","{$AC.POP.ID}"]'
          tags:
            - tag: ambiente
              value: eletrica
            - tag: tipo
              value: AR
          triggers:
            - uuid: 2980e1ea89664323bca78d3af4bbc8bd
              expression: 'last(/AC LG - API ShellScript/CONSUMOWATT)>=1000'
              name: 'Alto consumo de energia'
              event_name: 'Consumo acima de 1 kW'
              priority: INFO
              description: 'Revisar com Daniel | TELIC'
            - uuid: 983d55581c0f48fb9d2b5340c98cadc6
              expression: 'min(/AC LG - API ShellScript/CONSUMOWATT,6h) >= 700'
              name: 'Consumo alto por muito tempo'
              event_name: 'Consumo maior que 700 W por mais de 6 horas'
              priority: INFO
        - uuid: 9eda3a6d6f404a5d8a2be1b706ea0181
          name: 'MODO DE FUNCIONAMENTO'
          type: DEPENDENT
          key: MODOdeFUNCIONAMENTO
          delay: '0'
          history: 90d
          value_type: TEXT
          trends: '0'
          description: |
            MODO DE FUNCIONAMENTO | COOL | DRY | FAN | oto
            
            .{15}(\S{4}).{2}
          preprocessing:
            - type: REGEX
              parameters:
                - '([0-9]*);([0-9]*);([0-9]*);(\w{3,4});(\w{3,4});([0-9]*)'
                - \4
          master_item:
            key: 'check_LG_AC.sh["-D","{$AC.POP.ID}"]'
          tags:
            - tag: tipo
              value: AR
          triggers:
            - uuid: 84de322b0aec4ad78b0de5073e5625db
              expression: 'last(/AC LG - API ShellScript/MODOdeFUNCIONAMENTO)<>"COOL"'
              name: 'Modo de funcionamento fora do padrao'
              priority: HIGH
        - uuid: f1b5d16d0c3042d892a76eeb7c009c68
          name: STATUS
          type: DEPENDENT
          key: STATUS
          delay: '0'
          history: 90d
          description: 'Status On off do AC - ^[^;]+'
          valuemap:
            name: STATUS
          preprocessing:
            - type: REGEX
              parameters:
                - '([0-9]*);([0-9]*);([0-9]*);(\w{3,4});(\w{3,4});([0-9]*)'
                - \1
          master_item:
            key: 'check_LG_AC.sh["-D","{$AC.POP.ID}"]'
          tags:
            - tag: tipo
              value: AR
          triggers:
            - uuid: 5ddc91bdbd4847d59010a6b35ff55f45
              expression: 'last(/AC LG - API ShellScript/STATUS)<>1'
              name: 'AC desligado'
              priority: HIGH
              tags:
                - tag: 'alertas noc'
                  value: disponibilidade
        - uuid: ebe87d12f26449969aefbbf121526f01
          name: 'Temperatura Atual'
          type: DEPENDENT
          key: TemperaturaAtual
          delay: '0'
          history: 90d
          value_type: FLOAT
          units: ºC
          description: |
            Temperatura Atual
            
            .{09}(\d{2}).{2}
          preprocessing:
            - type: REGEX
              parameters:
                - '([0-9]*);([0-9]*);([0-9]*);(\w{3,4});(\w{3,4});([0-9]*)'
                - \2
          master_item:
            key: 'check_LG_AC.sh["-D","{$AC.POP.ID}"]'
          tags:
            - tag: ambiente
              value: temp
            - tag: tipo
              value: AR
          triggers:
            - uuid: c82ca0aa2c9a45b39c641aeaed03a3c1
              expression: 'last(/AC LG - API ShellScript/TemperaturaAtual)>={$AC.POP.TEMP}'
              name: 'Temperatura alta'
              event_name: 'Temperatura acima do limite configurado - {ITEM.LASTVALUE1}'
              priority: HIGH
              description: 'Temperatura acima do esperado, conforme macro {$AC.POP.TEMP}.'
              tags:
                - tag: 'alertas noc'
                  value: disponibilidade
        - uuid: de59df7a9911420da30f95d27312476a
          name: 'Temperatura Meta'
          type: DEPENDENT
          key: TemperaturaMeta
          delay: '0'
          history: 90d
          value_type: FLOAT
          units: ºC
          description: |
            Temperatura Meta
            
            .{12}(\d{2}).{2}
          preprocessing:
            - type: REGEX
              parameters:
                - '([0-9]*);([0-9]*);([0-9]*);(\w{3,4});(\w{3,4});([0-9]*)'
                - \3
          master_item:
            key: 'check_LG_AC.sh["-D","{$AC.POP.ID}"]'
          tags:
            - tag: tipo
              value: AR
          triggers:
            - uuid: 637bc1f9a12c487db2699ed1aef18285
              expression: 'last(/AC LG - API ShellScript/TemperaturaMeta) < 19'
              name: 'Temperatura meta baixa'
        - uuid: 43bbc45db05941488ef41c7f1ac75128
          name: VENTILADOR
          type: DEPENDENT
          key: VENTILADOR
          delay: '0'
          history: 90d
          value_type: TEXT
          trends: '0'
          description: |
            Velocidade do Ventilador
            .{20}(\S{4}).{2}
          preprocessing:
            - type: REGEX
              parameters:
                - '([0-9]*);([0-9]*);([0-9]*);(\w{3,4});(\w{3,4});([0-9]*)'
                - \5
          master_item:
            key: 'check_LG_AC.sh["-D","{$AC.POP.ID}"]'
          tags:
            - tag: tipo
              value: AR
          triggers:
            - uuid: 3d49822ddd0647b79942e909a3bfa113
              expression: 'last(/AC LG - API ShellScript/VENTILADOR)<>"HIGH"'
              name: 'Ventilador abaixo do esperado'
              priority: AVERAGE
      tags:
        - tag: tipo
          value: AC
      macros:
        - macro: '{$AC.POP.ID}'
          value: XPTO
        - macro: '{$AC.POP.NUMERO}'
          value: Px
        - macro: '{$AC.POP.TEMP}'
          value: '25'
      valuemaps:
        - uuid: 8b97587c36e24f459c94f93f64ecf9de
          name: STATUS
          mappings:
            - value: '1'
              newvalue: 'On'
            - value: '0'
              newvalue: 'Off'
  triggers:
    - uuid: 96b15ca8950c498a8327b760b0cc17db
      expression: 'last(/AC LG - API ShellScript/TemperaturaAtual)>last(/AC LG - API ShellScript/TemperaturaMeta)'
      name: 'Temperatura fora da meta'
      event_name: 'Temperatura fora da meta - {ITEM.LASTVALUE1}'
      priority: AVERAGE
      tags:
        - tag: 'alertas noc'
          value: disponibilidade
